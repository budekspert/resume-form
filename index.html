<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подача резюме | БудЕксперт</title>
<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com/css2?family=Syne:wght@500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090F;
  --bg2: #0B0F1A;
  --gold: #D4A843;
  --gold2: #F0C96A;
  --text: #EDE8DF;
  --muted: rgba(237,232,223,0.45);
  --border: rgba(212,168,67,0.15);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background-color: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
.form-container {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 30px 24px;
  border-radius: 12px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.form-header { margin-bottom: 24px; text-align: center; }
.form-header h1 { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
.form-header p { font-size: 13px; color: var(--muted); line-height: 1.4; }
.form-group { margin-bottom: 20px; position: relative; }
.form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 6px; font-weight: 700; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  background: rgba(7,9,15,0.6);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 10px rgba(212,168,67,0.2);
}
.form-group select { appearance: none; cursor: pointer; }
.form-group textarea { resize: vertical; min-height: 100px; }
.radio-group { display: flex; gap: 16px; margin-top: 6px; }
.radio-label { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text); cursor: pointer; }
.radio-label input { width: auto; cursor: pointer; }
.btn-submit {
  width: 100%;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #07090F;
  border: none;
  padding: 14px;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-radius: 6px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  margin-top: 10px;
}
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,168,67,0.3); }
.btn-submit:disabled { background: var(--muted); color: var(--bg); cursor: not-allowed; transform: none; box-shadow: none; }
#form-result { margin-top: 16px; font-size: 13px; text-align: center; font-family: 'JetBrains Mono', monospace; display: none; }
#form-result.success { color: #2ECC71; }
#form-result.error { color: #E74C3C; }
</style>
</head>
<body>

<div class="form-container">
  <div class="form-header">
    <h1>Анкета кандидата</h1>
    <p>Вакансія: Інженер-геодезист / Землевпорядник<br>Компанія «БудЕксперт»</p>
  </div>

  <!-- ФОРМА СТАРТ -->
  <form id="resume-form">
    <!-- ПРИХОВАНІ ПОЛЯ ДЛЯ WEB3FORMS -->
    <input type="hidden" name="access_key" value="7a7c94a8-8935-4659-88d0-1e900cb9460b">
    <input type="hidden" name="subject" value="Нове резюме: Інженер-геодезист з сайту БудЕксперт">
    <input type="hidden" name="from_name" value="Кадровий портал БудЕксперт">

    <div class="form-group">
      <label for="name">ПІБ (Повне ім'я) *</label>
      <input type="text" id="name" name="ПІБ" placeholder="Іванов Іван Іванович" required>
    </div>

    <div class="form-group">
      <label for="phone">Номер телефону *</label>
      <input type="tel" id="phone" name="Телефон" placeholder="+380" required>
    </div>

    <div class="form-group">
      <label for="location">Район проживання *</label>
      <select id="location" name="Район проживання" required>
        <option value="" disabled selected>Оберіть ваш район</option>
        <option value="Обухівський район">Обухівський район</option>
        <option value="Фастівський район">Фастівський район</option>
        <option value="Інший регіон">Інший регіон</option>
      </select>
    </div>

    <div class="form-group">
      <label for="experience">Офіційний стаж роботи (від 1 року) *</label>
      <select id="experience" name="Офіційний стаж" required>
        <option value="" disabled selected>Оберіть варіант</option>
        <option value="Немає досвіду">Немає офіційного досвіду</option>
        <option value="Від 1 до 3 років">Від 1 до 3 років (підходить під сертифікат)</option>
        <option value="Більше 3 років">Більше 3 років (підходить під сертифікат)</option>
      </select>
    </div>

    <div class="form-group">
      <label>Наявність авто та водійського посвідчення?</label>
      <div class="radio-group">
        <label class="radio-label"><input type="radio" name="Авто" value="Так, є авто та права" checked> Так, є</label>
        <label class="radio-label"><input type="radio" name="Авто" value="Тільки права"> Тільки права</label>
        <label class="radio-label"><input type="radio" name="Авто" value="Немає"> Немає</label>
      </div>
    </div>

    <div class="form-group">
      <label for="skills">Посилання на резюме або коротко про навички та обладнання</label>
      <textarea id="skills" name="Додаткова інформація" placeholder="Яким обладнанням володієте (GNSS, тахеометри), софт (Digitals, AutoCAD), або вставте посилання на ваше резюме на Work.ua/JS..."></textarea>
    </div>

    <button type="submit" id="btn-submit" class="btn-submit">Надіслати анкету</button>
    <div id="form-result"></div>
  </form>
  <!-- ФОРМА КІНЕЦЬ -->
</div>

<script>
const form = document.getElementById('resume-form');
const result = document.getElementById('form-result');
const submitBtn = document.getElementById('btn-submit');

form.addEventListener('submit', function(e) {
  e.preventDefault();
  
  // Перевірка чи змінено дефолтний ключ
  const accessKeyInput = form.querySelector('input[name="access_key"]').value;
  if(accessKeyInput === 'ТВІЙ_КЛЮЧ_WEB3FORMS') {
    result.style.display = 'block';
    result.className = 'error';
    result.innerHTML = 'Помилка: Не вказано сервісний Access Key у коді форми!';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerText = 'Відправка анкети...';
  result.style.display = 'none';

  const formData = new FormData(form);

  fetch('https://web3forms.com', {
    method: 'POST',
    body: formData
  })
  .then(async (response) => {
    let json = await response.json();
    if (response.status == 200) {
      result.style.display = 'block';
      result.className = 'success';
      result.innerHTML = 'Дякуємо! Анкета успішно надіслана. Ми зв\'яжемося з вами найближчим часом.';
      form.reset();
    } else {
      console.log(response);
      result.style.display = 'block';
      result.className = 'error';
      result.innerHTML = json.message || 'Щось пішло не так. Спробуйте пізніше.';
    }
  })
  .catch(error => {
    console.log(error);
    result.style.display = 'block';
    result.className = 'error';
    result.innerHTML = 'Помилка мережі. Перевірте з\'єднання та спробуйте ще раз.';
  })
  .then(function() {
    submitBtn.disabled = false;
    submitBtn.innerText = 'Надіслати анкету';
  });
});
</script>

</body>
</html>
