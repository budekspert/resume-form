<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подача резюме | БудЕксперт</title>
<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com/css2?family=Syne:wght@500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --bg: #07090F; --bg2: #0B0F1A; --gold: #D4A843; --gold2: #F0C96A; --text: #EDE8DF; --muted: rgba(237,232,223,0.45); --border: rgba(212,168,67,0.15); }
body { background-color: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.form-container { background: var(--bg2); border: 1px solid var(--border); padding: 30px 24px; border-radius: 12px; width: 100%; max-width: 500px; }
.form-header { text-align: center; margin-bottom: 24px; }
.form-header h1 { font-size: 24px; font-weight: 800; color: var(--text); }
.form-header p { font-size: 13px; color: var(--muted); }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 11px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; font-weight: 700; }
.form-group input, .form-group select, .form-group textarea { width: 100%; background: rgba(7,9,15,0.6); border: 1px solid var(--border); padding: 12px; border-radius: 6px; color: var(--text); font-family: 'Syne', sans-serif; }
.btn-submit { width: 100%; background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #07090F; border: none; padding: 14px; font-weight: 800; text-transform: uppercase; border-radius: 6px; cursor: pointer; }
#form-result { margin-top: 16px; text-align: center; display: none; }
#form-result.success { color: #2ECC71; }
#form-result.error { color: #E74C3C; }
</style>
</head>
<body>
<div class="form-container">
  <div class="form-header"><h1>Анкета кандидата</h1><p>Вакансія: Інженер-геодезист / Землевпорядник</p></div>
  <form id="resume-form">
    <input type="hidden" name="access_key" value="7a7c94a8-8935-4659-88d0-1e900cb9460b">
    <div class="form-group">
      <label>ПІБ *</label>
      <input type="text" name="name" required>
    </div>
    <div class="form-group">
      <label>Телефон *</label>
      <input type="tel" name="phone" required>
    </div>
    <div class="form-group">
      <label>Район проживання *</label>
      <select name="location" required>
        <option value="" disabled selected>Оберіть</option>
        <option value="Обухівський район">Обухівський район</option>
      </select>
    </div>
    <div class="form-group">
      <label>Досвід *</label>
      <select name="experience" required>
        <option value="Від 1 до 3 років">Від 1 до 3 років</option>
      </select>
    </div>
    <button type="submit" class="btn-submit">Надіслати</button>
    <div id="form-result"></div>
  </form>
</div>
<script>
const form = document.getElementById('resume-form');
const result = document.getElementById('form-result');
form.addEventListener('submit', function(e) {
  e.preventDefault();
  fetch('https://api.web3forms.com/submit', {
    method: 'POST',
    headers: { 'Accept': 'application/json' },
    body: new FormData(form)
  }).then(async (r) => {
    let json = await r.json();
    result.style.display = 'block';
    result.className = json.success ? 'success' : 'error';
    result.innerHTML = json.success ? 'Успішно надіслано!' : 'Помилка.';
    if(json.success) form.reset();
  });
});
</script>
</body>
</html>
